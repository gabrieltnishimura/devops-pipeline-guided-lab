name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: 
      - "main"
      - "al/**"
      - "feature/**"
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
# TODO: Part 1 
# - Create a job for "build" (building project)
# - Create a job for "test" (running unit tests)
# - Ensure the "test" only runs if the "build" step is successful.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

# TODO: Part 2 
# - Create a job for deploying the project to DockerHub.
# - Create a job for deploying the project to Render only if the DockerHub deploy is successful.
  deploy-to-docker:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/al/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: gabrieltnishimura/devops-pipeline-guided-lab:latest

  deploy-to-render:
    needs: deploy-to-docker
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/al/')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          curl --location 'https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys' \
          --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          --header 'Content-Type: application/json' \
          --data '{"image": { "ref": "latest" } }'



